<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <form action="">
        <div class="form__item">
            <div>
                <label for="login" class="form__label">Введите логин</label>
            </div>
            <div>
                <input type="text" id="login" class="form__field" required>
            </div>
        </div>
        <div class="form__item">
            <div>
                <label for="email" class="form__label">Введите email</label>
            </div>
            <div>
                <input type="email" id="email" class="form__field" required>
            </div>
        </div>
        <div class="form__item">
            <div>
                <label for="password" class="form__label">Введите пароль</label>
            </div>
            <div>
                <input type="password" id="password" class="form__field" required>
            </div>
        </div>
        <div class="form__item">
            <input type="submit" id="login" class="form__btn">
        </div>
    </form>
    <div class="box">
        <h3>Цвет</h3>
        <div class="filter-color">
            <div class="filter-color__item">
                <input class="filter-color__checkbox" type="checkbox" name="color-red" id="color-red">
                <label class="filter-color__label" for="color-red" aria-label="красный цвет" style="background-color: red;" tabindex="0"></label>
            </div>
            <div class="filter-color__item">
                <input class="filter-color__checkbox" type="checkbox" name="color-green" id="color-green">
                <label class="filter-color__label" for="color-green" aria-label="зеленый цвет" style="background-color: green;" tabindex="0"></label>
            </div>
            <div class="filter-color__item">
                <input class="filter-color__checkbox" type="checkbox" name="color-blue" id="color-blue">
                <label class="filter-color__label" for="color-blue" aria-label="синий цвет" style="background-color: blue;" tabindex="0"></label>
            </div>
            <div class="filter-color__item">
                <input class="filter-color__checkbox" type="checkbox" name="color-yellow" id="color-yellow">
                <label class="filter-color__label" for="color-yellow" aria-label="желтый цвет" style="background-color: yellow;" tabindex="0"></label>
            </div>
        </div>
    </div>
    <div class="filter__section" >
        <h3>Размер</h3>
        <div class="filter-size">
            <div class="filter-size__item">
                <input class="filter-size__radio" type="radio" name="size" id="size-s">
                <label class="filter-size__label" for="size-s" tabindex="0" id="size-s-label"
                aria-label="маленький размер" role="radio" aria-checked="false">S</label>
            </div>
        </div>
        <div class="filter-size">
            <div class="filter-size__item">
                <input class="filter-size__radio" type="radio" name="size" id="size-m">
                <label class="filter-size__label" for="size-m" tabindex="0" id="size-m-label"
                aria-label="средний размер" role="radio" aria-checked="false">M</label>
            </div>
        </div>
        <div class="filter-size">
            <div class="filter-size__item">
                <input class="filter-size__radio" type="radio" name="size" id="size-l" disabled>
                <label class="filter-size__label" for="size-l" tabindex="0" id="size-l-label"
                aria-label="большой размер" role="radio" aria-checked="false">L</label>
            </div>
        </div>
        <div class="filter-size">
            <div class="filter-size__item">
                <input class="filter-size__radio" type="radio" name="size" id="size-xl" disabled checked>
                <label class="filter-size__label" for="size-xl" tabindex="0" id="size-xl-label"
                aria-label="очень большой размер" role="radio" aria-checked="false">XL</label>
            </div>
        </div>
        <h3>Бренд</h3>
        <div class="filter-brand">
            <div class="filter-brand__item">
                <input class="filter-brand__checkbox" type="checkbox" name="brand-apple">
                <label class="filter-brand__label" for="brand-apple" tabindex="0" id="brand-apple-label"
                aria-label="бренд apple" role="checkbox" aria-checked="false">Apple</label>
            </div>
        </div>
        <div class="filter-brand">
            <div class="filter-brand__item">
                <input class="filter-brand__checkbox" type="checkbox" name="brand-samsung">
                <label class="filter-brand__label" for="brand-samsung" tabindex="0" id="brand-samsung-label"
                aria-label="бренд samsung" role="checkbox" aria-checked="false">Samsung</label>
            </div>
        </div>
        <div class="filter-brand">
            <div class="filter-brand__item">
                <input class="filter-brand__checkbox" type="checkbox" name="brand-xiaomi" disabled>
                <label class="filter-brand__label" for="brand-xiaomi" tabindex="0" id="brand-xiaomi-label"
                aria-label="бренд xiaomi" role="checkbox" aria-checked="false">Xiaomi</label>
            </div>
        </div>
        <div class="filter-brand">
            <div class="filter-brand__item">
                <input class="filter-brand__checkbox" type="checkbox" name="brand-huawei" disabled checked>
                <label class="filter-brand__label" for="brand-huawei" tabindex="0" id="brand-huawei-label"
                aria-label="бренд huawei" role="checkbox" aria-checked="false">Huawei</label>
            </div>
        </div>
    </div>
    <div class="filter__section">
        <h3>Цена</h3>
        <div class="filter-price">
            <div class="filter-price__range">
                <input type="range" class="filter-price__slider" id="price-range" min="0" max="100000" step="1000" value="50000">
            </div>
            <div class="filter-price__values">
                <span class="filter-price__min">0 &#8381</span>
                <span class="filter-price__max">100000 &#8381</span>
            </div>
        </div>
    </div>
    <div class="filter__section">
        <h3>Сортировка</h3>
        <select class="filter-sort" name="sort" id="sort" aria-label="Сортировка товаров">
            <option value="popular">По популярности</option>
            <option value="price-asc">По возрастанию цены</option>
            <option value="price-desc">По убыванию цены</option>
            <option value="rating">По рейтингу</option>
            <option value="new">Сначала новые</option>
        </select>
    </div>
</body>
</html>
